    <script>
        async function validateSession() {
            const encryptedData = JSON.parse(localStorage.getItem("encryptedData"));
            const sessionToken = localStorage.getItem("sessionToken");
            const sessionIV = localStorage.getItem("sessionIV");
            const sessionCreated = parseInt(localStorage.getItem("sessionCreated"));
            if(!encryptedData){
                window.location.replace("setup.html")
            }
    
            if (!encryptedData || !sessionToken || !sessionIV || !sessionCreated) {
                return false;
            }
    
            const now = Date.now();
            const maxSessionAge = 30 * 60 * 1000; 
            if (now - sessionCreated > maxSessionAge) {
                return false;
            }
    
            try {
                const keyBuffer = base64ToBuffer(encryptedData.keyBase64);
                const iv = base64ToBuffer(sessionIV);
                const encrypted = base64ToBuffer(sessionToken);
    
                const key = await crypto.subtle.importKey(
                    "raw",
                    keyBuffer,
                    { name: "AES-GCM" },
                    false,
                    ["decrypt"]
                );
    
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv },
                    key,
                    encrypted
                );

                return true;
            } catch (e) {

                return false;
            }
        }
    

        validateSession().then((isValid) => {
            if (isValid) {
                window.location.replace("index.html");
            }
        });

        function base64ToBuffer(base64) {
            const binary = atob(base64);
            const buffer = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                buffer[i] = binary.charCodeAt(i);
            }
            return buffer;
        }

        
    </script>

    <script>

function strToArrayBuffer(str) { return new TextEncoder().encode(str); }
function arrayBufferToStr(buffer) { return new TextDecoder().decode(buffer); }
function bufferToBase64(buffer) { return btoa(String.fromCharCode(...new Uint8Array(buffer))); }
function base64ToBuffer(base64) {
    const binary = atob(base64);
    const buffer = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
    return buffer;
}


function constantTimeEqual(a, b) {
    if (a.byteLength !== b.byteLength) return false;
    let diff = 0;
    const A = new Uint8Array(a);
    const B = new Uint8Array(b);
    for (let i = 0; i < A.length; i++) diff |= A[i] ^ B[i];
    return diff === 0;
}

async function verifyCredentials(masterPasswordInput, codewordInput) {
    const encryptedData = JSON.parse(localStorage.getItem("encryptedData"));
    if (!encryptedData) {
        return false;
    }

    let key;
    try {
        const keyBuffer = base64ToBuffer(encryptedData.keyBase64);
        key = await crypto.subtle.importKey(
            "raw",
            keyBuffer,
            { name: "AES-GCM" },
            false,
            ["decrypt"]
        );
    } catch (e) {
        console.error("Key import error", e);
        return false;
    }

    const iv = base64ToBuffer(encryptedData.iv);
    const passwordCiphertext = base64ToBuffer(encryptedData.passwordCiphertext);
    const passphraseCiphertext = base64ToBuffer(encryptedData.passphraseCiphertext);

    try {
        const decPasswordBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, passwordCiphertext);
        const decPassphraseBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, passphraseCiphertext);

        const inputPwBuf = strToArrayBuffer(masterPasswordInput);
        const inputPpBuf = strToArrayBuffer(codewordInput);

        const decPwU8 = new Uint8Array(decPasswordBuf);
        const decPpU8 = new Uint8Array(decPassphraseBuf);

        const pwMatches = constantTimeEqual(decPwU8, inputPwBuf);
        const ppMatches = constantTimeEqual(decPpU8, inputPpBuf);

        decPwU8.fill(0);
        decPpU8.fill(0);
        inputPwBuf.fill(0);
        inputPpBuf.fill(0);

        return pwMatches && ppMatches;
    } catch (e) {
        console.error("Decryption or verification failed", e);
        return false;
    }
}

document.querySelector(".lnextbtn").addEventListener("click", async () => {
    const pwv = document.getElementById("psk").value;
    const ok = await (async () => {
        const encryptedData = JSON.parse(localStorage.getItem("encryptedData"));
        if (!encryptedData) return false;
        try {
            const keyBuffer = base64ToBuffer(encryptedData.keyBase64);
            const key = await crypto.subtle.importKey("raw", keyBuffer, { name: "AES-GCM" }, false, ["decrypt"]);
            const iv = base64ToBuffer(encryptedData.iv);
            const passwordCiphertext = base64ToBuffer(encryptedData.passwordCiphertext);
            const decPasswordBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, passwordCiphertext);

            const decPwU8 = new Uint8Array(decPasswordBuf);
            const inputPwBuf = strToArrayBuffer(pwv);
            const pwMatches = constantTimeEqual(decPwU8, inputPwBuf);

            // zero out
            decPwU8.fill(0);
            inputPwBuf.fill(0);

            return pwMatches;
        } catch (e) {
            console.error(e);
            return false;
        }
    })();

    if (ok) {
        cmsg = "Is it really you?"
    zepp.classList.add("on")
    zlin.innerHTML = cmsg
        document.querySelector(".expos").classList.add("l");
    } else {
        cmsg = "Incorrect password. who are you 🔪"
    zepp.classList.add("on")
    zlin.innerHTML = cmsg
    }
});

document.querySelector(".lfnext").addEventListener("click", async () => {
    const pwv = document.getElementById("psk").value;
    const ppv = document.getElementById("pasp").value;

    const ok = await verifyCredentials(pwv, ppv);
    if (!ok) {
        cmsg = "Incorrect passphrase. who are you 🔪"
    
    zepp.classList.add("on")
    zlin.innerHTML = cmsg
        return;
    }

    const sessionToken = crypto.getRandomValues(new Uint8Array(32)); // 256-bit
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const encryptedData = JSON.parse(localStorage.getItem("encryptedData"));
    const keyBuffer = base64ToBuffer(encryptedData.keyBase64);
    const sessionKey = await crypto.subtle.importKey("raw", keyBuffer, { name: "AES-GCM" }, false, ["encrypt"]);

    const encryptedToken = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, sessionKey, sessionToken);

    localStorage.setItem("sessionToken", bufferToBase64(encryptedToken));
    localStorage.setItem("sessionIV", bufferToBase64(iv));
    localStorage.setItem("sessionCreated", Date.now().toString());

    sessionToken.fill(0);

    window.location.replace("index.html");
});
