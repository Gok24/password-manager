    <script>
        (async function validateSession() {
            const encryptedData = JSON.parse(localStorage.getItem("encryptedData"));
            const token = localStorage.getItem("sessionToken");
            const iv = localStorage.getItem("sessionIV");
            const created = parseInt(localStorage.getItem("sessionCreated"), 10);
        
            function strToArrayBuffer(str) {
            return new TextEncoder().encode(str);
        }

        function arrayBufferToStr(buffer) {
            return new TextDecoder().decode(buffer);
        }

        function bufferToBase64(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        function base64ToBuffer(base64) {
            const binary = atob(base64);
            const buffer = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                buffer[i] = binary.charCodeAt(i);
            }
            return buffer;
        }
            if (!token || !iv || !encryptedData || !created) {

                window.location.replace("login.html");
                return;
            }
        
            const THIRTY_MIN = 1000 * 60 * 10;
            if (Date.now() - created > THIRTY_MIN) {
                console.warn("Session expired");
                localStorage.removeItem("sessionCreated");
                localStorage.removeItem("sessionIV");
                localStorage.removeItem("sessionToken")
                window.location.replace("login.html");
                return;
            }
        
            try {
                const keyBuffer = base64ToBuffer(encryptedData.keyBase64);
                const importedKey = await crypto.subtle.importKey(
                    "raw",
                    keyBuffer,
                    { name: "AES-GCM" },
                    false,
                    ["decrypt"]
                );
        
                const decryptedToken = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: base64ToBuffer(iv) },
                    importedKey,
                    base64ToBuffer(token)
                );
        

                console.log("Session validated.");
        
            } catch (e) {
                console.error("Session validation failed:", e);
                localStorage.removeItem("sessionCreated");
                localStorage.removeItem("sessionIV");
                localStorage.removeItem("sessionToken")
                window.location.replace("login.html");
            }
        })();
        </script>
